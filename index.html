<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <title>NFT preview card component by Pietro</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="root-container">
      <div class="nft-card-container">
        <div class="contents-container">
          <div class="img-wrapper">
            <img
              src="images/image-equilibrium.jpg"
              alt="picture of cube"
              class="equilibrium"
            />
          </div>
          <div class="text">
            <h1 class="title">Equilibrium #3429</h1>
            <p class="desc gray">
              Our Equilibrium collection promotes balance and calm.
            </p>
            <div class="eth-and-time">
              <div class="eth">
                <img src="images/icon-ethereum.svg" alt="ethereum logo" />
                <span>0.041 ETH</span>
              </div>
              <div class="time">
                <img src="images/icon-clock.svg" alt="image of clock" />
                <span class="gray">3 days left</span>
              </div>
            </div>
          </div>
          <hr />
          <div class="creation">
            <img
              src="images/image-avatar.png"
              alt="picture of man"
              class="avatar"
            />
            <p>
              <span class="gray">Creation of </span
              ><span class="jules">Jules Wyvern</span>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
